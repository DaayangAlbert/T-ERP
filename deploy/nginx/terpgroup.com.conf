# =============================================================================
#  Nginx reverse proxy — T-ERP production (terpgroup.com)
# =============================================================================
#
#  Placement : /etc/nginx/sites-available/terpgroup.com
#  Activation : ln -s /etc/nginx/sites-available/terpgroup.com \
#                     /etc/nginx/sites-enabled/
#
#  Domaines couverts :
#   - terpgroup.com           → Landing publique
#   - www.terpgroup.com       → idem (redirect canonical)
#   - app.terpgroup.com       → Portail public général
#   - admin.terpgroup.com     → Console super-admin
#   - <slug>.terpgroup.com    → Espace tenant (wildcard)
#
#  SSL : Let's Encrypt via certbot avec wildcard (DNS-01 challenge).
#  Cf. server-setup.sh étape "SSL".
# =============================================================================

# --- Rate limiting global ---
limit_req_zone $binary_remote_addr zone=terp_general:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=terp_login:10m rate=5r/s;

# --- Upstream Next.js (PM2) ---
upstream terp_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# --- HTTP → HTTPS redirect (toutes formes du domaine) ---
server {
    listen 80;
    listen [::]:80;
    server_name terpgroup.com www.terpgroup.com *.terpgroup.com;

    # ACME challenge (renouvellement Let's Encrypt HTTP-01 fallback)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS principal — terpgroup.com + wildcard *.terpgroup.com ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name terpgroup.com www.terpgroup.com *.terpgroup.com;

    # Certificat wildcard (couvre tous les sous-domaines tenant)
    ssl_certificate     /etc/letsencrypt/live/terpgroup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/terpgroup.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    # NB: ssl_session_timeout/cache/tickets sont déjà définis dans
    # options-ssl-nginx.conf (généré par certbot). Ne pas redéfinir ici.

    # HSTS (renforcement, déjà posé côté Next mais nginx en dernier rempart)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Tailles
    client_max_body_size 10M;          # CV PDF max 5Mo + marge
    client_body_buffer_size 128k;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # --- Rate limit login (anti brute force) ---
    location ~ ^/api/(auth|cand/auth|admin/auth)/login {
        limit_req zone=terp_login burst=10 nodelay;
        proxy_pass http://terp_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # --- Tout le reste vers Next.js ---
    location / {
        limit_req zone=terp_general burst=100 nodelay;

        proxy_pass http://terp_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_connect_timeout 5s;
    }

    # --- Fichiers uploadés (logos, signatures, cachets, CV) ---
    # Servis DIRECTEMENT depuis le disque (bypass Next.js). Stockés dans un
    # dossier STABLE hors de .next (sinon perdus à chaque `next build`).
    # Le code écrit via UPLOAD_ROOT=/var/www/terp/uploads (cf upload-paths.ts).
    # `^~` : priorité sur la regex images ci-dessous (sinon .png serait proxifié).
    location ^~ /uploads/ {
        alias /var/www/terp/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        try_files $uri =404;
    }

    # --- Assets statiques Next : cache long ---
    location ~* ^/_next/static/ {
        proxy_pass http://terp_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|css|js)$ {
        proxy_pass http://terp_app;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # --- /api/public/* : pas de rate-limit strict (formulaire démo, recrutement) ---
    location ^~ /api/public/ {
        proxy_pass http://terp_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Pages d'erreur custom (optionnel) ---
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        root /var/www/terp/public;
        internal;
    }
}
